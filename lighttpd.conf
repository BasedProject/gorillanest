server.modules = (
    "mod_fastcgi",
    "mod_rewrite",
    "mod_setenv"
)

server.document-root = var.CWD
server.port = 5050

url.rewrite-once = (
    "/" => "/gorillanest"
)

setenv.add-environment = (
    "PERL5LIB" => env.PERL5LIB
)

fastcgi.server = (
    "/gorillanest" => ((
        "bin-path" => "gorillanest",
        "socket"   => "gorillanest.sock",
    ))
)

fastcgi.debug = 1
