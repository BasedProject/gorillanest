[core]
GIT_ROOT = repositories
DISABLE_AUTHENTICATOR = 0

[mirror]
PULL_INTERVAL = 3600

[ssh]
HOST_KEY_PATH = .env/gn_host_key
LISTEN_ADDR   = 0.0.0.0
LISTEN_PORT   = 2222

[frontend]
BARE_REQUEST           = 0
LOG_FILE               = /tmp/gorillanest.log
DB_FILE                = gorillanest.sqlite3
SOCKET_FILE            = /tmp/gorillanest.socket
SOCKET_MAX_CONNECTIONS = 100
TEMPLATE_ROOT          = www/template/
HTTPS_ONLY             = 1
DISABLE_API            = 0
USE_CGI                = 0
